<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#FFFDF8;
overflow:hidden;
position:relative;
text-align:center;
padding:20px;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#FFEFA0;
border-radius:50%;
top:-180px;
left:-180px;
filter:blur(90px);
opacity:.8;
}

body::after{
content:"";
position:absolute;
width:450px;
height:450px;
background:#FFDCEB;
border-radius:50%;
bottom:-180px;
right:-180px;
filter:blur(90px);
opacity:.7;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:74px;
color:#C6284A;
opacity:0;
animation:fadeIn 1.5s forwards;
}

h2{
font-family:'Great Vibes',cursive;
font-size:110px;
font-weight:400;
color:#B33A57;
margin-top:-8px;
opacity:0;
animation:fadeIn 1.5s forwards;
animation-delay:1.2s;
letter-spacing:2px;
text-shadow:
0 0 10px rgba(179,58,87,.15),
0 0 25px rgba(255,214,232,.25);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}
}

#cake{
width:250px;
margin-top:30px;
opacity:0;
transform:translateY(100px);
animation:cakeRise 1.8s forwards;
animation-delay:2.5s;
filter:drop-shadow(0 10px 20px rgba(0,0,0,.08));
}
@keyframes cakeRise{
from{
opacity:0;
transform:translateY(120px);
}
to{
opacity:1;
transform:translateY(0);
}
}

#signature{
margin-top:25px;
font-family:'Great Vibes',cursive;
font-size:32px;
color:#A06B62;
opacity:0;
animation:fadeIn 2s forwards;
animation-delay:4.5s;
}

.heart{
position:fixed;
color:#E9A3B0;
font-size:18px;
opacity:.35;
animation:floatHeart 8s ease-in-out infinite;
pointer-events:none;
}
.h1{
left:12%;
bottom:10%;
}
.h2{
right:15%;
top:20%;
animation-delay:2s;
}
.h3{
left:20%;
top:35%;
animation-delay:4s;
}
.h4{
right:22%;
bottom:18%;
animation-delay:1s;
}
@keyframes floatHeart{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-20px);
}
100%{
transform:translateY(0px);
}
}

#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}
.firework{

position:absolute;

width:1px;

height:1px;

pointer-events:none;

}

.particle{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
box-shadow:0 0 8px currentColor;
animation:burst 1.5s ease-out forwards;
}

@keyframes burst{

0%{

transform:translate(0,0) scale(1);

opacity:1;

}

100%{
transform:translate(var(--x),var(--y)) scale(.1);
opacity:0;
}

}
#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:0;
}
h1,
h2,
#cake,
#signature{
position:relative;
z-index:2;
}

</style>
</head>

<body>
<h1>
Happy happie Birthday,
</h1>

<h2>
Gobbiiii 
</h2>

<img src="images/cake/cake.png" id="cake">

<p id="signature">
with endless love,
<br>
Amu 🤍
</p>

<div class="heart h1">♥</div>
<div class="heart h2">♥</div>
<div class="heart h3">♥</div>
<div class="heart h4">♥</div>

<div id="fireworks"></div>

<script>

const colors=[
"#FFF7C7",   // butter yellow
"#FFD9E8",   // soft pink
"#FCE9F1",   // blush
"#F6C1CF",   // rose
"#FFFDF8"    // ivory
];

function createFirework(){

const container=document.createElement("div");

container.className="firework";

container.style.left=(35+Math.random()*30)+"%";

container.style.top=(15+Math.random()*35)+"%";

for(let i=0;i<28;i++){

const particle=document.createElement("div");

particle.className="particle";

particle.style.background=

colors[Math.floor(Math.random()*colors.length)];

const angle=(Math.PI*2/28)*i;

const distance=60+Math.random()*50;

particle.style.setProperty("--x",

Math.cos(angle)*distance+"px");

particle.style.setProperty("--y",

Math.sin(angle)*distance+"px");

container.appendChild(particle);

}

document.getElementById("fireworks").appendChild(container);

setTimeout(()=>{

container.remove();

},1500);

}

setTimeout(()=>{

createFirework();

setInterval(createFirework,1300);

},3800);

</script>

<audio id="bgMusic" loop preload="auto">
<source src="music/birthday.mpeg" type="audio/mpeg">
</audio>
<script>
window.addEventListener("DOMContentLoaded",function(){
const music=document.getElementById("bgMusic");
music.volume=0.45;
setTimeout(function(){
music.currentTime = 0;
music.play().catch(function(e){
console.log(e);
});
},3800);
});
</script>

</body>
</html>
