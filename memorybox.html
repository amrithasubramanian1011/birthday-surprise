<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Box</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#FFFDF8,#FFF4B5,#FFD6E8);

font-family:'Poppins',sans-serif;

overflow:hidden;

}

.box{

background:rgba(255,255,255,.65);

backdrop-filter:blur(12px);

padding:55px;

border-radius:30px;

text-align:center;

box-shadow:0 20px 45px rgba(0,0,0,.12);

max-width:700px;

width:90%;

}

h1{

font-family:'Cormorant Garamond',serif;

font-size:56px;

color:#fae842;

margin-bottom:25px;

}

p{

font-size:20px;

line-height:1.9;

color:#5A3E36;

margin-bottom:40px;

}

button{

background:#C6284A;

color:white;

padding:18px 42px;

border:none;

border-radius:50px;

font-size:18px;

cursor:pointer;

transition:.35s;

font-family:'Poppins',sans-serif;
letter-spacing:1px;

font-weight:500;

box-shadow:0 10px 25px rgba(198,40,74,.15);

}

button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="box">

<h1>✨நினைவுப் பேழை✨</h1>

<p>

Every smile holds a memory.
Every pic holds a lil story💎
Let's open our little treasure chest together.

</p>

<button onclick="window.location.href='gallery.html'">

திரந்திடு ஸீஸே🚪

</button>

</div>

</body>

</html>
